name: Release

on:
    release:
        types: [published]

jobs:
    build-and-upload:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - run: npm install

            - run: npm run build

            - name: Package dist
              run: zip -r figma-tinypng-plugin.zip dist/

            - name: Upload Release Asset
              uses: softprops/action-gh-release@v2
              with:
                  files: figma-tinypng-plugin.zip
